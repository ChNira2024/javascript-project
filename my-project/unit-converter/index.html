<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
</head>
<body>
    <h1>Unit Converter</h1>
    <input type="number" id = "inputValue" placeholder="Enter unit">
    <select id="conversionType">
        <option value="mToft">Meters to Feet</option>
        <option value="kgToLb">Kilograms to Pounds</option>
        <option value="cToF">Celcius to Farenheit</option>
    </select>
    <button id="convert">Convert</button>
    <p>Converted Value : <span id="convertedValue">0</span></p>
</body>
<script src="index.js"></script>
<link rel="stylesheet" href="style.css">
</html>
